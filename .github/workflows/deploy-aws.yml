name: Deploy to AWS EKS

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to AWS EKS
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      CLUSTER_NAME: eksclusterxd  # <--- Tu clúster real

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set image variables
        id: image-vars
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "api_repo=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/docker-testing-api" >> "$GITHUB_OUTPUT"
          echo "frontend_repo=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/docker-testing-frontend" >> "$GITHUB_OUTPUT"
          echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build API image
        env:
          IMAGE_TAG: ${{ steps.image-vars.outputs.tag }}
          API_REPO: ${{ steps.image-vars.outputs.api_repo }}
        run: |
          docker build -t "${API_REPO}:${IMAGE_TAG}" -t "${API_REPO}:latest" ./mi-api

      - name: Build Frontend image
        env:
          IMAGE_TAG: ${{ steps.image-vars.outputs.tag }}
          FRONTEND_REPO: ${{ steps.image-vars.outputs.frontend_repo }}
        run: |
          docker build -t "${FRONTEND_REPO}:${IMAGE_TAG}" -t "${FRONTEND_REPO}:latest" ./mi-front

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push API image
        env:
          IMAGE_TAG: ${{ steps.image-vars.outputs.tag }}
          API_REPO: ${{ steps.image-vars.outputs.api_repo }}
        run: |
          docker push "${API_REPO}:${IMAGE_TAG}"
          docker push "${API_REPO}:latest"

      - name: Push Frontend image
        env:
          IMAGE_TAG: ${{ steps.image-vars.outputs.tag }}
          FRONTEND_REPO: ${{ steps.image-vars.outputs.frontend_repo }}
        run: |
          docker push "${FRONTEND_REPO}:${IMAGE_TAG}"
          docker push "${FRONTEND_REPO}:latest"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "${{ env.CLUSTER_NAME }}" \
            --region "${{ env.AWS_REGION }}"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Render Kubernetes manifests
        env:
          ECR_API_IMAGE: ${{ steps.image-vars.outputs.api_repo }}:${{ steps.image-vars.outputs.tag }}
          ECR_FRONTEND_IMAGE: ${{ steps.image-vars.outputs.frontend_repo }}:${{ steps.image-vars.outputs.tag }}
        run: |
          mkdir -p k8s/rendered
          for manifest in k8s/*.yaml; do
            envsubst < "$manifest" > "k8s/rendered/$(basename "$manifest")"
          done

      - name: Deploy application to Kubernetes
        run: |
          kubectl apply -f k8s/rendered/namespace.yaml
          kubectl wait --for=condition=ready namespace/docker-testing --timeout=10s || true
          kubectl apply -f k8s/rendered/configmap.yaml
          kubectl apply -f k8s/rendered/api-deployment.yaml
          kubectl apply -f k8s/rendered/api-service.yaml
          kubectl apply -f k8s/rendered/frontend-deployment.yaml
          kubectl apply -f k8s/rendered/frontend-service.yaml

      - name: Print external endpoints
        run: |
          echo "Getting external endpoints..."
          sleep 10
          FRONTEND_HOST=$(kubectl get svc mi-front -n docker-testing -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "========================================"
          echo "Application deployed successfully"
          echo "Frontend URL: http://${FRONTEND_HOST}"
          echo "========================================"