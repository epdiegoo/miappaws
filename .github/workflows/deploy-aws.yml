name: Deploy to AWS EKS

on:
  workflow_run:
    workflows:
      - "Bun & Docker DevSecOps Pipeline"
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to AWS EKS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_project_name: docker-testing
      TF_VAR_cluster_name: docker-testing-eks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Ensure ECR repositories exist
        working-directory: terraform
        run: |
          if ! aws ecr describe-repositories --repository-names docker-testing-api >/dev/null 2>&1; then
            terraform apply -auto-approve \
              -target=aws_ecr_repository.api \
              -target=aws_ecr_repository.frontend
          fi

      - name: Set image variables
        id: image-vars
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "api_repo=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/docker-testing-api" >> "$GITHUB_OUTPUT"
          echo "frontend_repo=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/docker-testing-frontend" >> "$GITHUB_OUTPUT"
          echo "tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

      - name: Build API image
        env:
          IMAGE_TAG: ${{ steps.image-vars.outputs.tag }}
          API_REPO: ${{ steps.image-vars.outputs.api_repo }}
        run: |
          docker build -t "${API_REPO}:${IMAGE_TAG}" -t "${API_REPO}:latest" ./mi-api

      - name: Build Frontend image
        env:
          IMAGE_TAG: ${{ steps.image-vars.outputs.tag }}
          FRONTEND_REPO: ${{ steps.image-vars.outputs.frontend_repo }}
        run: |
          docker build -t "${FRONTEND_REPO}:${IMAGE_TAG}" -t "${FRONTEND_REPO}:latest" ./mi-front

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push API image
        env:
          IMAGE_TAG: ${{ steps.image-vars.outputs.tag }}
          API_REPO: ${{ steps.image-vars.outputs.api_repo }}
        run: |
          docker push "${API_REPO}:${IMAGE_TAG}"
          docker push "${API_REPO}:latest"

      - name: Push Frontend image
        env:
          IMAGE_TAG: ${{ steps.image-vars.outputs.tag }}
          FRONTEND_REPO: ${{ steps.image-vars.outputs.frontend_repo }}
        run: |
          docker push "${FRONTEND_REPO}:${IMAGE_TAG}"
          docker push "${FRONTEND_REPO}:latest"

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "${{ env.TF_VAR_cluster_name }}" \
            --region "${{ env.AWS_REGION }}"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: v1.29.0

      - name: Render Kubernetes manifests
        env:
          ECR_API_IMAGE: ${{ steps.image-vars.outputs.api_repo }}:${{ steps.image-vars.outputs.tag }}
          ECR_FRONTEND_IMAGE: ${{ steps.image-vars.outputs.frontend_repo }}:${{ steps.image-vars.outputs.tag }}
        run: |
          mkdir -p k8s/rendered
          for manifest in k8s/*.yaml; do
            envsubst < "$manifest" > "k8s/rendered/$(basename "$manifest")"
          done

      - name: Deploy application to Kubernetes
        run: |
          kubectl apply -f k8s/rendered/namespace.yaml
          kubectl wait --for=condition=ready namespace/docker-testing --timeout=10s || true
          kubectl apply -f k8s/rendered/configmap.yaml
          kubectl apply -f k8s/rendered/api-deployment.yaml
          kubectl apply -f k8s/rendered/api-service.yaml
          kubectl apply -f k8s/rendered/frontend-deployment.yaml
          kubectl apply -f k8s/rendered/frontend-service.yaml

      - name: Wait for application rollout
        run: |
          kubectl rollout status deployment/mi-api -n docker-testing --timeout=300s
          kubectl rollout status deployment/mi-front -n docker-testing --timeout=300s

      - name: Print external endpoints
        run: |
          echo "Getting external endpoints..."
          
          FRONTEND_HOST=$(kubectl get svc mi-front -n docker-testing \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}{.status.loadBalancer.ingress[0].ip}')
          
          GRAFANA_HOST=$(kubectl get svc kube-prometheus-stack-grafana -n monitoring \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")

          echo ""
          echo "========================================"
          echo " Application deployed successfully"
          echo "========================================"
          echo ""
          echo "Frontend URL: http://${FRONTEND_HOST}"
          echo "API (internal): http://mi-api.docker-testing.svc.cluster.local:3000"
          if [ -n "$GRAFANA_HOST" ]; then
            echo "Grafana URL: http://${GRAFANA_HOST}"
            echo "Grafana default credentials: admin / prom-operator"
          fi
          echo ""
          echo "CloudWatch log group: $(cd terraform && terraform output -raw cloudwatch_log_group_name)"
          echo "ECR API repository: $(cd terraform && terraform output -raw ecr_api_repository_url)"
          echo "ECR Frontend repository: $(cd terraform && terraform output -raw ecr_frontend_repository_url)"
          echo "EKS cluster: ${{ env.TF_VAR_cluster_name }}"
          echo "Region: ${{ env.AWS_REGION }}"
