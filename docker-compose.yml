services:
  app:
    build: ./mi-api
    container_name: anime-api
    ports:
      - "3000:3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  client:
    build: ./mi-front
    container_name: anime-client
    ports:
      - "3001:3001"
    environment:
      API_BASE_URL: http://app:3000
    restart: unless-stopped
    depends_on:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M